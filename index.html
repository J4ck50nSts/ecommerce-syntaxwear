<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntaxWear - Tênis e Sneakers Online</title>
    <meta name="description"
        content="Compre os melhores tênis e sneakers online na SyntaxWear. Encontre os lançamentos mais quentes, ofertas exclusivas e uma seleção incrível de calçados para todos os estilos. Transforme seu visual com nossos produtos de alta qualidade.">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components/header.css">
    <link rel="stylesheet" href="./css/components/hero.css">
    <link rel="stylesheet" href="./css/components/product-category.css">
</head>

<body>

    <header class="header">
        <!-- Logo e Navegação Principal -->
        <h1 class="logo">
            <a href="/" title="SyntaxWear - Tênis e Sneakers Online">
                <img src="./images/logo/Logo.svg" alt="SyntaxWear - Tênis e Sneakers Online">
            </a>
        </h1>
        <nav class="nav-center" aria-label="Categorias Principais">
            <ul class="nav-list">
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>
        </nav>
        <nav class="nav-right" aria-label="Acesso rápido">
            <ul>
                <li><a href="#">Nossas lojas</a></li>
                <li><a href="#">Sobre</a></li>

                <li>
                    <a href="#" aria-label="Minha conta">
                        <img src="./images/icons/user-icon.svg" alt="Ícone de usuário">
                    </a>
                </li>
                <li>
                    <a href="#" aria-label="Ajuda">
                        <img src="./images/icons/help-icon.svg" alt="Ajuda">
                    </a>
                </li>
                <li>
                    <a href="#" aria-label="Carrinho de compras">
                        <img src="./images/icons/cart-icon.svg" alt="Carrinho de compras">
                    </a>
                </li>
            </ul>
        </nav>


    </header>


    <main>
        <section class="hero-section">
            <!-- Banner de destaque -->
            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-subtitle">Krypton One</span>
                    <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
                    <div class="hero-buttons">
                        <a href="#" class="btn btn-outline">Ver modelos</a>
                        <a href="#" class="btn btn-filled">Comprar</a>
                    </div>
                </div>

            </div>
        </section>

        <section class="categories-section">
            <!-- Seção de categorias -->
            <div class="category-card casual">
                <a href="#">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Casual</span>                    
                </a>
            </div>
            <div class="category-card esporte">
                <a href="#">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Esporte</span>
                </a>
            </div>
            <div class="category-card moderno">
                <a href="#">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Moderno</span>
                </a>
            </div>
            <div class="category-card futurista">
                <a href="#">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Futurista</span>
                </a>
            </div>
        </section>

        <section class="featured-products">
            <!-- Vitrine de produtos (A grid 4x4 entrará aqui) -->
        </section>
    </main>

    <footer class="main-footer">
        <!-- Informações de contato, links e copyright -->
    </footer>

</body>

</html>
